name: SAP BAS Keep Alive (Auto Login)

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Login to BAS
        env:
          BAS_URL: ${{ secrets.BAS_URL }}
          BTP_USER: ${{ secrets.BTP_USER }}
          BTP_PASSWORD: ${{ secrets.BTP_PASSWORD }}
          BAS_SPACE_NAME: ${{ secrets.BAS_SPACE_NAME }}
        run: node scripts/bas-login.js

      - name: Upload screenshots
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bas-screenshots-${{ github.run_number }}
          path: /tmp/bas-*.png
          retention-days: 7
