name: SAP BAS Keep Alive (Auto Login)

on:
  schedule:
    - cron: '0 2 * * *'    # 每天 UTC 02:00 执行一次（新加坡时间早上10点）
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Login to BAS
        env:
          BAS_URL: ${{ secrets.BAS_URL }}
          BTP_USER: ${{ secrets.BTP_USER }}
          BTP_PASSWORD: ${{ secrets.BTP_PASSWORD }}
        run: node scripts/bas-login.js

      - name: Upload screenshot on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: bas-error-screenshot
          path: /tmp/bas-error.png
          retention-days: 3
