name: SAP BAS Keep Alive

on:
  schedule:
    - cron: '0 * * * *'   # 每小时执行一次
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: write       # 允许提交代码

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Login to BAS
        env:
          BAS_URL: ${{ secrets.BAS_URL }}
          BTP_USER: ${{ secrets.BTP_USER }}
          BTP_PASSWORD: ${{ secrets.BTP_PASSWORD }}
          BAS_SPACE_NAME: ${{ secrets.BAS_SPACE_NAME }}
        run: node scripts/bas-login.js

      - name: Keep repo active (prevent GitHub disabling workflow)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          echo "Last run: $(date -u '+%Y-%m-%d %H:%M:%S UTC')" > .last-run
          git add .last-run
          git diff --staged --quiet || git commit -m "chore: keepalive $(date -u '+%Y-%m-%d %H:%M')"
          git push
